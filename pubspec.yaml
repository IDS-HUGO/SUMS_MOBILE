name: sums
description: "Sistema de Captura Operativa SUMS"
publish_to: 'none'

# 🚀 El cambio vital: subimos de +1 a +2 para que Google Play lo acepte
version: 1.0.0+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # --- UI & State Management ---
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  sqflite: ^2.3.0

  # --- Networking & Background ---
  http: ^1.6.0
  connectivity_plus: ^7.1.1
  workmanager: ^0.9.0+3
  shared_preferences: ^2.5.5

  # --- Database (Drift / SQLite, cifrada con SQLCipher) & Paths ---
  drift: ^2.34.0
  sqlite3: ^3.3.3
  path_provider: ^2.1.6
  path: ^1.9.1
  flutter_secure_storage: ^10.3.1
  flutter_jailbreak_detection: ^1.10.0
  crypto: ^3.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- Code Generation ---
  build_runner: ^2.15.0
  drift_dev: ^2.34.1+1

  # --- Asset Tools ---
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/certs/

# La BD local (Drift/SQLite) guarda cédulas completas (nombres, domicilios,
# datos de salud) sin cifrado de campo. Se compila sqlite3 con soporte
# SQLCipher en vez de la build estándar, para cifrar el archivo .sqlite
# completo con una clave (ver lib/core/storage/local_database.dart).
hooks:
  user_defines:
    sqlite3:
      source: sqlcipher

flutter_icons:
  android: "ic_launcher_imss"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/IMSS_SOLO_LOGO_PADDED.png"
  ios: true
  image_path: "assets/images/IMSS_SOLO_LOGO_PADDED.png"
  web:
    generate: true
    image_path: "assets/images/IMSS_SOLO_LOGO.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/images/IMSS_SOLO_LOGO.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/IMSS_SOLO_LOGO.png"